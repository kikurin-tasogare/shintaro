<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2D6A4F">
  <meta name="description" content="心友の増量特化 筋トレ・食事記録＆メニュー管理">
  <title>心友 Bulk Log — 増量トレーニング記録</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🌿</span>
          <div>
            <h1>心友 Bulk Log</h1>
            <p class="tagline">増量フェーズ専用トレーニング記録</p>
          </div>
        </div>
        <div class="header-stats" id="headerStats"></div>
      </div>
    </header>

    <main class="main" id="mainContent"></main>

    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn active" data-page="home">
        <span class="nav-icon">🏠</span>
        <span>ホーム</span>
      </button>
      <button class="nav-btn" data-page="log">
        <span class="nav-icon">📝</span>
        <span>記録</span>
      </button>
      <button class="nav-btn" data-page="menu">
        <span class="nav-icon">📋</span>
        <span>メニュー</span>
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
